<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUT-Centric DLA Visualizer (Advanced)</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #1e1e1e;
            color: #d4d4d4;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { color: #569cd6; margin-bottom: 10px;}
        
        .dashboard {
            background-color: #252526;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            width: 95%;
            max-width: 1400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Top Configuration Panel */
        .config-panel {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            background-color: #2d2d30;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #3e3e42;
        }
        .config-panel label {
            display: flex;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #9cdcfe;
        }
        .config-panel input[type="number"] {
            width: 50px;
            margin-left: 8px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #555;
            border-radius: 3px;
            padding: 4px;
            text-align: center;
        }
        .config-panel button {
            background-color: #4CAF50;
            margin-left: 10px;
        }
        .config-panel button:hover { background-color: #45a049; }

        /* Controls Panel */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #444;
        }
        .speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1e1e1e;
            padding: 8px 15px;
            border-radius: 4px;
            border: 1px solid #444;
        }
        
        button {
            background-color: #0e639c;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #1177bb; }
        button:disabled { background-color: #555; cursor: not-allowed; }
        
        .status-bar {
            text-align: center;
            font-size: 16px;
            margin-bottom: 20px;
            color: #ce9178;
            font-family: monospace;
            background: #1e1e1e;
            padding: 12px;
            border-radius: 4px;
            border-left: 4px solid #ce9178;
        }

        .architecture {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 20px;
            overflow-x: auto;
        }

        .component {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #2d2d30;
            padding: 15px;
            border-radius: 8px;
            min-width: fit-content;
        }

        .component-title {
            margin-bottom: 10px;
            font-weight: bold;
            color: #4ec9b0;
        }

        .grid {
            display: grid;
            gap: 3px;
            background-color: #555;
            padding: 3px;
            border-radius: 4px;
        }

        .cell {
            background-color: #1e1e1e;
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 13px;
            color: #d4d4d4;
            transition: all 0.15s ease;
            box-sizing: border-box;
        }

        .editable-cell {
            cursor: text;
            border: 1px solid transparent;
        }
        .editable-cell:hover {
            border: 1px solid #0e639c;
            background-color: #252526;
        }
        .editable-cell:focus {
            outline: none;
            background-color: #000;
            border: 1px solid #4ec9b0;
        }

        /* Highlighting Classes */
        .active-a { background-color: #d7ba7d; color: #000; font-weight: bold; transform: scale(1.1); box-shadow: 0 0 5px #d7ba7d; z-index: 10;}
        .active-lut { background-color: #c586c0; color: #000; font-weight: bold; transform: scale(1.1); box-shadow: 0 0 5px #c586c0; z-index: 10;}
        .active-c { background-color: #4caf50; color: #000; font-weight: bold; transform: scale(1.1); box-shadow: 0 0 5px #4caf50; z-index: 10;}
        .done-c { background-color: #274928; color: #aaa; }
        
        .lut-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 600px;
        }
    </style>
</head>
<body>

    <h2>LUT-Centric DLA Visualizer</h2>
    
    <div class="dashboard">
        
        <!-- Parameter Configuration -->
        <div class="config-panel">
            <label>M (Rows): <input type="number" id="inp-m" value="4" min="1" max="10"></label>
            <label>N (Cols C): <input type="number" id="inp-n" value="3" min="1" max="10"></label>
            <label>Nc (Subspaces): <input type="number" id="inp-nc" value="2" min="1" max="8"></label>
            <label>V (Vec Size): <input type="number" id="inp-v" value="2" min="1" max="8"></label>
            <label>Centroids: <input type="number" id="inp-centroids" value="4" min="1" max="16"></label>
            <button onclick="applyConfig()">Apply & Rebuild</button>
        </div>

        <div class="controls">
            <button id="btn-reset" onclick="resetSimulation()">Reset Compute</button>
            <button id="btn-step" onclick="stepForward()">Next Step</button>
            <button id="btn-run" onclick="toggleRun()">Auto Run</button>
            
            <div class="speed-control">
                <label for="inp-speed" style="font-size: 14px; color: #9cdcfe;">Speed:</label>
                <input type="range" id="inp-speed" min="50" max="2000" value="800" oninput="updateSpeed()">
                <span id="speed-label" style="font-size: 14px; width: 50px;">800ms</span>
            </div>
        </div>

        <div class="status-bar" id="status">
            Initialization Complete. Edit matrix/LUT values directly, or press "Next Step" to begin.
        </div>

        <div class="architecture">
            <!-- Input Matrix A -->
            <div class="component">
                <div class="component-title" id="title-a">Input Matrix A (M=4, K=4)</div>
                <div class="grid" id="grid-a"></div>
                <div style="margin-top:10px; font-size:12px; color:#aaa;" id="subtitle-a">Nc=2 Subspaces, V=2</div>
            </div>

            <!-- LUT Arrays -->
            <div class="component">
                <div class="component-title" id="title-lut">Precomputed LUTs (Nc=2)</div>
                <div class="lut-container" id="lut-container">
                    <!-- LUTs generated dynamically -->
                </div>
            </div>

            <!-- Output Matrix C -->
            <div class="component">
                <div class="component-title" id="title-c">Output Matrix C (M=4, N=3)</div>
                <div class="grid" id="grid-c"></div>
            </div>
        </div>
    </div>

    <script>
        // Global Dimensions
        let M = 4, N = 3, Nc = 2, V = 2, Centroids = 4;
        let K = Nc * V;

        // State Tracking
        let m = 0, nc = 0, n = 0;
        let isRunning = false;
        let runTimer = null;
        let isFinished = false;
        let currentSpeed = 800;

        // Data Arrays
        let matrixA = [];
        let lutArrays = []; 
        let matrixC = [];

        function updateSpeed() {
            currentSpeed = document.getElementById('inp-speed').value;
            document.getElementById('speed-label').textContent = currentSpeed + "ms";
        }

        function applyConfig() {
            // Read inputs
            M = Math.max(1, parseInt(document.getElementById('inp-m').value) || 4);
            N = Math.max(1, parseInt(document.getElementById('inp-n').value) || 3);
            Nc = Math.max(1, parseInt(document.getElementById('inp-nc').value) || 2);
            V = Math.max(1, parseInt(document.getElementById('inp-v').value) || 2);
            Centroids = Math.max(1, parseInt(document.getElementById('inp-centroids').value) || 4);
            K = Nc * V;
            
            // Update Titles
            document.getElementById('title-a').textContent = `Input Matrix A (M=${M}, K=${K})`;
            document.getElementById('subtitle-a').textContent = `Nc=${Nc} Subspaces, V=${V}`;
            document.getElementById('title-lut').textContent = `Precomputed LUTs (Nc=${Nc})`;
            document.getElementById('title-c').textContent = `Output Matrix C (M=${M}, N=${N})`;

            // Stop run if running
            if (isRunning) toggleRun();
            
            initData();
            renderGrids();
            document.getElementById('status').innerHTML = "Configuration applied. Architecture rebuilt.";
        }

        function initData() {
            // Randomize Matrix A (0-9)
            matrixA = Array.from({length: M}, () => Array.from({length: K}, () => Math.floor(Math.random() * 10)));
            
            // Randomize LUTs (Centroids x N) for each Subspace
            lutArrays = [];
            for(let s = 0; s < Nc; s++) {
                lutArrays[s] = Array.from({length: Centroids}, () => Array.from({length: N}, () => Math.floor(Math.random() * 5)));
            }

            // Initialize Matrix C (Zeros)
            matrixC = Array.from({length: M}, () => Array(N).fill(0));
            
            // Reset state
            m = 0; nc = 0; n = 0;
            isFinished = false;
        }

        function renderGrids() {
            // --- Render A ---
            const gridA = document.getElementById('grid-a');
            gridA.style.gridTemplateColumns = `repeat(${K}, 1fr)`;
            gridA.innerHTML = '';
            for(let r=0; r<M; r++) {
                for(let c=0; c<K; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell editable-cell';
                    cell.id = `a-${r}-${c}`;
                    cell.contentEditable = true; // Make it editable
                    cell.textContent = matrixA[r][c];
                    // Update array when user types
                    cell.onblur = (e) => {
                        let val = parseInt(e.target.textContent);
                        if(isNaN(val)) val = 0;
                        e.target.textContent = val;
                        matrixA[r][c] = val;
                    };
                    gridA.appendChild(cell);
                }
            }

            // --- Render LUTs ---
            const lutContainer = document.getElementById('lut-container');
            lutContainer.innerHTML = '';
            for(let s=0; s<Nc; s++) {
                const wrapper = document.createElement('div');
                
                const label = document.createElement('div');
                label.style.fontSize = '12px';
                label.style.textAlign = 'center';
                label.style.marginBottom = '5px';
                label.textContent = `Subspace ${s}`;
                wrapper.appendChild(label);

                const gridLUT = document.createElement('div');
                gridLUT.className = 'grid';
                gridLUT.style.gridTemplateColumns = `repeat(${N}, 1fr)`;
                
                for(let r=0; r<Centroids; r++) {
                    for(let c=0; c<N; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell editable-cell';
                        cell.id = `lut-${s}-${r}-${c}`;
                        cell.contentEditable = true; // Make editable
                        cell.textContent = lutArrays[s][r][c];
                        // Update array when user types
                        cell.onblur = (e) => {
                            let val = parseInt(e.target.textContent);
                            if(isNaN(val)) val = 0;
                            e.target.textContent = val;
                            lutArrays[s][r][c] = val;
                        };
                        gridLUT.appendChild(cell);
                    }
                }
                wrapper.appendChild(gridLUT);
                lutContainer.appendChild(wrapper);
            }

            // --- Render C ---
            const gridC = document.getElementById('grid-c');
            gridC.style.gridTemplateColumns = `repeat(${N}, 1fr)`;
            gridC.innerHTML = '';
            for(let r=0; r<M; r++) {
                for(let c=0; c<N; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell'; // Not editable
                    cell.id = `c-${r}-${c}`;
                    cell.textContent = matrixC[r][c];
                    gridC.appendChild(cell);
                }
            }
        }

        function clearHighlights() {
            document.querySelectorAll('.cell').forEach(el => {
                el.classList.remove('active-a', 'active-lut', 'active-c');
            });
        }

        function stepForward() {
            if (isFinished) return;

            clearHighlights();

            // Simulate VQ mapping: pick a random centroid index for visualization
            let nearestCentroidIdx = Math.floor(Math.random() * Centroids);

            // 1. Highlight Input Vector in A
            let colStart = nc * V;
            let vecValues = [];
            for(let v = 0; v < V; v++) {
                let cellEl = document.getElementById(`a-${m}-${colStart + v}`);
                cellEl.classList.add('active-a');
                vecValues.push(matrixA[m][colStart + v]);
            }

            // 2. Highlight LUT entry
            let lutVal = lutArrays[nc][nearestCentroidIdx][n];
            document.getElementById(`lut-${nc}-${nearestCentroidIdx}-${n}`).classList.add('active-lut');

            // 3. Accumulate and Highlight Output C
            matrixC[m][n] += lutVal;
            let cCell = document.getElementById(`c-${m}-${n}`);
            cCell.textContent = matrixC[m][n];
            cCell.classList.add('active-c');

            // Update Status
            document.getElementById('status').innerHTML = 
                `State [N=${n}, Nc=${nc}, M=${m}] &nbsp;|&nbsp; ` +
                `Subvec A[${vecValues.join(',')}] mapped to Centroid <span style="color:#c586c0">${nearestCentroidIdx}</span> &nbsp;⟶&nbsp; ` + 
                `Adding LUT val <span style="color:#c586c0">${lutVal}</span> to C[${m},${n}]`;

            // --- ITERATION LOGIC: M first, then Nc, then N ---
            m++;
            if (m >= M) {
                m = 0;
                nc++;
                if (nc >= Nc) {
                    nc = 0;
                    // Mark column N as done visually
                    for(let r=0; r<M; r++) document.getElementById(`c-${r}-${n}`).classList.add('done-c');
                    n++;
                    if (n >= N) {
                        isFinished = true;
                        document.getElementById('status').innerHTML = "✅ Compute Finished! All columns processed.";
                    }
                }
            }
        }

        // Recursive timeout loop to allow dynamic speed changes while running
        function autoStepLoop() {
            if (!isRunning) return;
            stepForward();
            if (!isFinished && isRunning) {
                runTimer = setTimeout(autoStepLoop, currentSpeed);
            } else if (isFinished) {
                toggleRun(); // Turn off visually
            }
        }

        function toggleRun() {
            if (isFinished) return;
            isRunning = !isRunning;
            let btn = document.getElementById('btn-run');
            let stepBtn = document.getElementById('btn-step');
            
            if (isRunning) {
                btn.textContent = "Pause";
                btn.style.backgroundColor = "#cc3333";
                stepBtn.disabled = true;
                autoStepLoop();
            } else {
                btn.textContent = "Auto Run";
                btn.style.backgroundColor = "#0e639c";
                stepBtn.disabled = false;
                clearTimeout(runTimer);
            }
        }

        function resetSimulation() {
            if(isRunning) toggleRun();
            
            // Clear Matrix C
            matrixC = Array.from({length: M}, () => Array(N).fill(0));
            m = 0; nc = 0; n = 0;
            isFinished = false;
            
            // Update visuals
            clearHighlights();
            document.querySelectorAll('.cell').forEach(el => el.classList.remove('done-c'));
            for(let r=0; r<M; r++) {
                for(let c=0; c<N; c++) {
                    document.getElementById(`c-${r}-${c}`).textContent = 0;
                }
            }
            document.getElementById('status').innerHTML = "Compute Reset. Ready to start.";
        }

        // Initialize on load
        window.onload = () => {
            applyConfig(); // uses the default HTML values to setup the first time
        };
    </script>
</body>
</html>
